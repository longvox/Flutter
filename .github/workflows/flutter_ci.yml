name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and analyze
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build-android:
    name: Build Android App
    needs: test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  firebase-test-lab:
    name: Run UI tests with Firebase Test Lab
    needs: build-android
    runs-on: ubuntu-22.04
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - name: Download app APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: app-debug

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCLOUD_AUTH }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Install beta components
        run: |
          gcloud components install beta --quiet
          gcloud components update --quiet

      - name: Create storage bucket
        run: |
          BUCKET_NAME="longvox_test_flutter"

          # Try to create the bucket, ignore if it already exists
          gsutil mb -p ${{ secrets.FIREBASE_PROJECT_ID }} gs://$BUCKET_NAME || true

          # Set bucket permissions
          gsutil iam ch serviceAccount:test-flutter@longvox-172516.iam.gserviceaccount.com:objectCreator gs://$BUCKET_NAME
          gsutil iam ch serviceAccount:test-flutter@longvox-172516.iam.gserviceaccount.com:objectViewer gs://$BUCKET_NAME

      - name: Run tests in Firebase Test Lab
        run: |
          BUCKET_NAME="${{ secrets.FIREBASE_PROJECT_ID }}-test-lab"
          gcloud firebase test android run \
            --type robo \
            --app app-debug/app-debug.apk \
            --device model=Pixel2,version=28 \
            --timeout 2m \
            --results-bucket=gs://$BUCKET_NAME \
            --results-dir=test-results \
            --quiet

